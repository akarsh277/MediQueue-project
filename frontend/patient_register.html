<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediQueue — Patient Registration</title>
  <meta name="description" content="Register a new patient account to book appointments.">
  <link rel="stylesheet" href="style.css?v=3">
  <style>
    .login-card {
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header .brand {
      justify-content: center;
      margin-bottom: 1rem;
    }

    .login-header p {
      color: var(--txt-200);
      font-size: .9rem;
    }

    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .input-wrap .form-input {
      padding-left: 2.5rem;
    }
  </style>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <div class="bg-mesh"></div>
  <div id="toast-container"></div>

  <div class="center-box">
    <div class="card login-card fade-in">
      <div class="login-header">
        <div class="brand">
          <span>Medi<span class="hl">Queue</span></span>
        </div>
        <p id="page-subtitle">Create a Patient Account</p>
      </div>

      <!-- Step 1 -->
      <form id="step-1-form" class="form-stack" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Full Name</label>
          <div class="input-wrap">
            <input id="username" type="text" class="form-input" placeholder="Your full name" required
              autocomplete="name">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <div class="input-wrap">
            <input id="phone" type="tel" class="form-input" placeholder="10-digit mobile number" maxlength="10" required
              autocomplete="tel">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input id="password" type="password" class="form-input" style="padding-right: 2.5rem;"
              placeholder="Create a password" required autocomplete="new-password">
            <span class="toggle-password"
              style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--txt-200); user-select: none; display:flex; align-items:center;"><svg
                xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="age">Age</label>
          <div class="input-wrap">
            <input id="age" type="number" class="form-input" placeholder="Your age" required min="1" max="120">
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-full" id="review-btn" style="margin-top:.5rem;">
          Review Details ➔
        </button>

        <div style="text-align:center; margin-top:1rem;">
          <p class="sub">Already have an account? <a href="login.html"
              style="color:var(--clr-primary); text-decoration:none;">Go back to Login</a></p>
        </div>
      </form>

      <!-- Step 2 -->
      <div id="step-2-confirm" style="display:none;" class="form-stack">
        <div
          style="background: rgba(255,255,255,0.03); border: 1px solid var(--clr-border); padding: 1rem; border-radius: 8px;">
          <div style="margin-bottom: 0.5rem;"><strong
              style="color:var(--txt-200); font-size: 0.8rem; text-transform: uppercase;">Name</strong><br><span
              id="c-name" style="font-size: 1.1rem;"></span></div>
          <div style="margin-bottom: 0.5rem;"><strong
              style="color:var(--txt-200); font-size: 0.8rem; text-transform: uppercase;">Phone</strong><br><span
              id="c-phone" style="font-size: 1.1rem;"></span></div>
          <div style="margin-bottom: 0.5rem;"><strong
              style="color:var(--txt-200); font-size: 0.8rem; text-transform: uppercase;">Age</strong><br><span
              id="c-age" style="font-size: 1.1rem;"></span></div>
          <div><strong
              style="color:var(--txt-200); font-size: 0.8rem; text-transform: uppercase;">Password</strong><br><span
              style="font-size: 1.1rem;">••••••••</span></div>
        </div>

        <div style="display:flex; gap: 0.5rem; margin-top:.5rem;">
          <button type="button" class="btn btn-ghost" id="back-btn" style="flex:1;">Back</button>
          <button type="button" class="btn btn-primary btn-lg" id="register-btn" style="flex:2;">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js?v=3"></script>
  <script>
    const step1 = document.getElementById('step-1-form');
    const step2 = document.getElementById('step-2-confirm');
    const reviewBtn = document.getElementById('review-btn');
    const registerBtn = document.getElementById('register-btn');
    const backBtn = document.getElementById('back-btn');
    const togglePwd = document.querySelector('.toggle-password');
    const pwdInput = document.getElementById('password');

    // Password Visibility Toggle
    togglePwd.addEventListener('click', () => {
      const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
      pwdInput.setAttribute('type', type);
      togglePwd.innerHTML = type === 'password' ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    });

    // Step 1 to Step 2
    step1.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const age = document.getElementById('age').value.trim();
      const password = pwdInput.value.trim();

      if (!username || !phone || !password || !age) {
        showToast('Please fill all fields', 'warn'); return;
      }
      if (parseInt(age) <= 0) {
        showToast('Age cannot be zero or negative', 'warn'); return;
      }
      if (phone.length !== 10 || !/^\d+$/.test(phone)) {
        showToast('Phone must be 10 digits', 'warn'); return;
      }

      document.getElementById('c-name').textContent = username;
      document.getElementById('c-phone').textContent = phone;
      document.getElementById('c-age').textContent = age;

      step1.style.display = 'none';
      step2.style.display = 'flex';
      document.getElementById('page-subtitle').textContent = 'Confirm Details';
    });

    // Back Button
    backBtn.addEventListener('click', () => {
      step2.style.display = 'none';
      step1.style.display = 'flex';
      document.getElementById('page-subtitle').textContent = 'Create a Patient Account';
    });

    // Final Registration Call
    registerBtn.addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const age = parseInt(document.getElementById('age').value.trim(), 10);
      const password = pwdInput.value.trim();

      setLoading(registerBtn, true);
      try {
        const res = await api('/register/patient', 'POST', { username, phone, password, age });

        setSession(res.user_id, res.role);
        showToast('Registration successful! Redirecting...', 'success');
        registerBtn.innerHTML = '✅ Welcome!';

        setTimeout(() => {
          location.href = 'patient_dashboard.html';
        }, 700);

      } catch (err) {
        showToast(err.message || 'Failed to register', 'error');
        setLoading(registerBtn, false);
      }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('SW registered!', reg.scope);
        }).catch(err => {
          console.log('SW registration failed: ', err);
        });
      });
    }
  </script>
</body>

</html>
