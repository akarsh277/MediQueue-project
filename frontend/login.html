<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediQueue — Login</title>
  <meta name="description" content="MediQueue hospital queue management system login portal.">
  <link rel="stylesheet" href="style.css?v=3">
  <style>
    .login-card {
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header .brand {
      justify-content: center;
      margin-bottom: 1rem;
    }

    .login-header p {
      color: var(--txt-200);
      font-size: .9rem;
    }

    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .input-wrap .form-input {
      padding-left: 2.5rem;
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
    }

    .forgot-row span {
      font-size: .82rem;
      color: var(--txt-300);
    }

    .role-hint {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-top: .25rem;
    }

    .role-chip {
      font-size: .75rem;
      padding: .25rem .65rem;
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--clr-border);
      border-radius: 100px;
      color: var(--txt-300);
    }

    .divider-or {
      display: flex;
      align-items: center;
      gap: .75rem;
      color: var(--txt-300);
      font-size: .82rem;
      margin: .5rem 0;
    }

    .divider-or::before,
    .divider-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--clr-border);
    }

    .error-msg {
      background: var(--clr-danger-dim);
      border: 1px solid rgba(255, 86, 119, .25);
      border-radius: var(--radius-sm);
      padding: .7rem 1rem;
      color: var(--clr-danger);
      font-size: .88rem;
      display: none;
      align-items: center;
      gap: .5rem;
    }

    .error-msg.show {
      display: flex;
    }

    /* animated cross / plus background */
    .bg-cross {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-cross::before,
    .bg-cross::after {
      content: '+';
      position: absolute;
      font-size: 4rem;
      font-weight: 300;
      color: rgba(0, 198, 167, .06);
      animation: float 8s ease-in-out infinite;
    }

    .bg-cross::before {
      top: 15%;
      left: 10%;
      animation-delay: 0s;
    }

    .bg-cross::after {
      bottom: 20%;
      right: 12%;
      animation-delay: -4s;
      font-size: 5rem;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-18px) rotate(15deg);
      }
    }
  </style>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <div class="bg-mesh"></div>
  <div class="bg-cross"></div>
  <div id="toast-container"></div>

  <div class="center-box">
    <div class="card login-card fade-in">
      <div class="login-header">
        <div class="brand">
          <span>Medi<span class="hl">Queue</span></span>
        </div>
        <p>Hospital Queue Management System</p>
      </div>

      <form id="login-form" class="form-stack" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username or Phone</label>
          <div class="input-wrap">
            <input id="username" type="text" class="form-input" placeholder="Enter username or phone" required
              autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input id="password" type="password" class="form-input" placeholder="Enter your password" required
              autocomplete="current-password" style="padding-right:2.5rem;">
            <button type="button" id="toggle-password"
              style="position:absolute; right:.4rem; top:50%; transform:translateY(-50%); background:transparent; border:none; color:var(--txt-300); cursor:pointer; padding:.2rem; display:flex; align-items:center;"><svg
                xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg></button>
          </div>
        </div>


        <button type="submit" class="btn btn-primary btn-lg btn-full" id="login-btn">
          Sign In →
        </button>
      </form>

      <div class="divider"></div>

      <div style="text-align:center;">
        <p class="sub" style="margin-bottom:.6rem;">Don't have an account?</p>
        <a href="patient_register.html" class="btn btn-ghost"
          style="padding: 0.5rem 1.5rem; text-decoration: none; border: 1px solid var(--clr-border); border-radius: 100px;">Register
          as Patient</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js?v=4"></script>
  <script>
    // If already logged in, auto-redirect
    const { userId, role } = getSession();
    if (userId) {
      if (role === 'admin') window.location.href = 'admin.html';
      else if (role === 'doctor') window.location.href = 'doctor.html';
      else if (role === 'patient') window.location.href = 'patient_dashboard.html';
    }

    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const usernameInput = document.getElementById('username');

    // Smart input validation: If starts with a digit, treat as phone number (10 max).
    usernameInput.addEventListener('input', function () {
      if (/^\d/.test(this.value)) {
        // Strip non-digits and limit to 10 characters
        this.value = this.value.replace(/\D/g, '').substring(0, 10);
      }
    });

    function showError(msg) {
      showToast(msg, 'error');
    }

    document.getElementById('toggle-password').addEventListener('click', function () {
      const passwordInput = document.getElementById('password');
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.innerHTML = type === 'password' ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) { showError('Please enter both fields.'); return; }

      setLoading(btn, true);
      try {
        const res = await api('/login', 'POST', { username, password });
        setSession(res.user_id, res.role, res.access_token);
        showToast('Login successful! Redirecting…', 'success');
        btn.innerHTML = 'Welcome!';

        setTimeout(() => {
          const role = (res.role || '').toLowerCase().trim();
          if (role === 'admin') location.href = 'admin.html';
          else if (role === 'doctor') location.href = 'doctor.html';
          else if (role === 'patient') location.href = 'patient_dashboard.html';
          else location.href = 'patient_dashboard.html'; // Fallback
        }, 700);

      } catch (err) {
        showError(err.message || 'Invalid credentials.');
        setLoading(btn, false);
      }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('SW registered!', reg.scope);
        }).catch(err => {
          console.log('SW registration failed: ', err);
        });
      });
    }
  </script>
</body>

</html>
